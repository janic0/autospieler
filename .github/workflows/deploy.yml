name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -fsS -X POST \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}?job=${{ github.event.repository.name }}&ref=${{ github.ref }}&sha=${{ github.sha }}"
